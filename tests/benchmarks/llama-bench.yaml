# llama-bench suite for model / hardware benchmarking.
#
# Use this for published-style throughput comparisons.

global:
  repetitions: 7

cases:
  - label: gpt-oss-20b_1card
    model: gpt-oss-20b-mxfp4.gguf
    cuda_visible_devices: "1"
    split_mode: none
    main_gpu: 0
    n_gpu_layers: -1
    flash_attn: on
    workloads:
      - label: pp128
        n_prompt: 128
        n_gen: 0
      - label: pp512
        n_prompt: 512
        n_gen: 0
      - label: pp2048
        n_prompt: 2048
        n_gen: 0
      - label: tg128
        n_prompt: 0
        n_gen: 128
      - label: tg512
        n_prompt: 0
        n_gen: 512

  - label: gpt-oss-20b_2card_split
    model: gpt-oss-20b-mxfp4.gguf
    cuda_visible_devices: "1,2"
    split_mode: layer
    tensor_split: "1/1"
    main_gpu: 0
    n_gpu_layers: -1
    flash_attn: on
    workloads:
      - label: pp128
        n_prompt: 128
        n_gen: 0
      - label: pp512
        n_prompt: 512
        n_gen: 0
      - label: pp2048
        n_prompt: 2048
        n_gen: 0
      - label: tg128
        n_prompt: 0
        n_gen: 128
      - label: tg512
        n_prompt: 0
        n_gen: 512

  - label: qwen3.6-27b-q3_2card
    model: Qwen3.6-27B-Q3_K_S.gguf
    cuda_visible_devices: "1,2"
    split_mode: layer
    tensor_split: "1/1"
    main_gpu: 0
    n_gpu_layers: -1
    flash_attn: on
    workloads:
      - label: pp128
        n_prompt: 128
        n_gen: 0
      - label: pp512
        n_prompt: 512
        n_gen: 0
      - label: pp2048
        n_prompt: 2048
        n_gen: 0
      - label: tg128
        n_prompt: 0
        n_gen: 128
      - label: tg512
        n_prompt: 0
        n_gen: 512
