# load-test suite for end-to-end server benchmarking.
#
# The runner updates .env per case, calls utils/deploy_service.sh --restart,
# then executes tests/load_test.py and writes results to:
#   tests/results/load-test/YYYY-MM-DD_<case-label>_slotsN/load_test.csv

global:
  # If true, update deployment env and restart service before each case
  deploy: true
  # If true, pass --restart when deploying
  deploy_restart: true
  # Base HTTP endpoint for load_test.py requests
  url: http://localhost:8502
  # Requests issued per concurrency level
  requests: 3
  # Concurrency levels tested for each case
  levels: [1, 2, 4, 8, 16, 32]
  # max_tokens for each API request
  max_tokens: 128
  # Whether to use streaming responses
  stream: false

# Case fields:
# - label: output suffix for this scenario
# - model: GGUF model filename
# - cuda_device: CUDA_VISIBLE_DEVICES value
# - tensor_split: optional per-GPU tensor split ratios
# - gpu_layers: number of GPU-offloaded layers
# - ctx_size: model context size for deployment
# - slots: server slot count
# - prompt_cache_size: prompt cache capacity
cases:
  - label: gpt-oss-20b_slots1
    model: gpt-oss-20b-mxfp4.gguf
    cuda_device: "0"
    gpu_layers: -1
    ctx_size: 131072
    slots: 1
    prompt_cache_size: 131072

  - label: gpt-oss-20b_slots2
    model: gpt-oss-20b-mxfp4.gguf
    cuda_device: "0"
    gpu_layers: -1
    ctx_size: 131072
    slots: 2
    prompt_cache_size: 131072

  - label: gpt-oss-20b_slots4
    model: gpt-oss-20b-mxfp4.gguf
    cuda_device: "0"
    gpu_layers: -1
    ctx_size: 131072
